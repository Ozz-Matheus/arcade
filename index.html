<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <link rel="icon" type="image/png" href="favicon/ico.png" />
  <title>Arcade</title>
  <style>
    /* STAR JEDI (titulos) */
    @font-face {
        font-family: 'StarJedi';
        src: url('src/fonts/Starjedi.woff2') format('woff2'),
            url('src/fonts/Starjedi.woff') format('woff');
        font-display: swap;
    }

    /* BEBAS NEUE (parrafos) */
    @font-face {
        font-family: 'BebasNeue';
        src: url('src/fonts/BebasNeue.woff2') format('woff2'),
            url('src/fonts/BebasNeue.woff') format('woff');
        font-display: swap;
    }
    :root{
      --safe-top:    env(safe-area-inset-top, 0px);
      --safe-right:  env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left:   env(safe-area-inset-left, 0px);
    }
    /* alto real en móviles (sin afectar canvas con padding) */
    html, body {
      width: 100vw;
      height: 100dvh;
      position: fixed;
    }
    body{
      font-family: 'BebasNeue', Arial, sans-serif;
      margin: 0;
      padding: 0;                 /*  no empujes el canvas */
      background: #000;
      overflow: hidden;           /* evita scroll accidental */
      touch-action: none;         /* bloquea gestos del navegador */
    }
    canvas{ display:block; border:none }
  </style>
</head>
<body>
    <!-- Phaser CDN -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.js"></script>
    <!-- Juego -->
    <script type="module" src="./src/index.js"></script>
</body>
</html>
